# humanizer_rules.default.yml
# Default humanizer configuration for blog-pipeline v0.2.0
# Copy this file to humanizer_rules.yml in your project root to customize.

banned_words:
  - "leverage"
  - "seamless"
  - "robust"
  - "cutting-edge"
  - "game-changer"
  - "revolutionize"
  - "synergy"
  - "paradigm"
  - "transformative"
  - "unlock"
  - "delve"
  - "streamline"
  - "elevate"
  - "empower"
  - "holistic"
  - "utilize"
  - "facilitate"
  - "innovative"
  - "solution"
  - "ecosystem"
  - "journey"
  - "furthermore"
  - "moreover"
  - "consequently"
  - "nevertheless"
  - "aforementioned"
  - "groundbreaking"
  - "spearhead"
  - "harness"
  - "pivotal"
  - "endeavor"
  - "realm"
  - "landscape"
  - "foster"
  - "encompass"
  - "comprehensive"
  - "intricate"
  - "multifaceted"
  - "nuanced"
  - "paramount"
  - "plethora"
  - "myriad"
  - "commendable"
  - "noteworthy"
  - "crucial"
  - "vital"
  - "indispensable"
  - "testament"
  - "underscores"
  - "underpin"
  - "underpinning"
  - "overarching"
  - "proliferation"
  - "burgeoning"
  - "quintessential"

banned_phrases:
  - "in conclusion"
  - "in summary"
  - "to summarize"
  - "it's worth noting"
  - "it is worth noting"
  - "it's important to note"
  - "it bears mentioning"
  - "needless to say"
  - "at the end of the day"
  - "in today's rapidly evolving"
  - "in the ever-evolving"
  - "dive deep into"
  - "deep dive into"
  - "let's delve into"
  - "without further ado"
  - "in this article, we will"
  - "in this blog post"

sentence_start_flags:
  - "Furthermore,"
  - "Moreover,"
  - "Additionally,"
  - "Consequently,"
  - "Nevertheless,"
  - "Notably,"
  - "Importantly,"
  - "Interestingly,"
  - "Significantly,"
  - "Essentially,"
  - "Fundamentally,"
  - "Ultimately,"

max_exclamations: 1
require_contractions: true
max_paragraph_repeat_starts: 2

rules:
  - "Remove ALL em-dashes. Replace with commas, full stops, or rephrase."
  - "Remove semicolons used to connect sentences. Use a full stop or restructure."
  - "Remove all emojis."
  - "Replace every banned word with a plain alternative."
  - "Use contractions: write it's, we're, you'll, don't, can't."
  - "Use active voice. Kill passive constructions."
  - "Maximum {max_exclamations} exclamation mark(s) in the entire post."
  - "Never open a section with banned phrases like 'In conclusion' or 'In summary'."
  - "Keep technical accuracy. Do not change code blocks."
  - "Return only the rewritten blog post, no commentary, no preamble."
  - "Vary paragraph openings. No more than {max_paragraph_repeat_starts} paragraphs in a row can start with the same word."
  - "Do not start sentences with flagged transition words like 'Furthermore,' or 'Moreover,'."
  - "Write like a human engineer talking to peers. Be direct and opinionated."
  - "Prefer short sentences. If a sentence is over 30 words, break it up."
